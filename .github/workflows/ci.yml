name: Playwright CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly regression sweep against the live target.
    - cron: '17 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the live target — used both as Playwright's
  # BASE_URL and for the reachability checks below.
  CI: 'true'
  BASE_URL: https://automationexercise.com

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      # The suite runs against a live third-party site. If that site is down at
      # the start, skip the run rather than spending 20 minutes timing out — an
      # outage of someone else's server is not a failure of this test code.
      - name: Preflight — is the target reachable?
        id: preflight
        run: |
          for attempt in 1 2 3; do
            if curl -sSf -m 15 -o /dev/null "$BASE_URL/"; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt: $BASE_URL not reachable yet…"
            sleep 5
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::$BASE_URL is unreachable — skipping the run (treated as a target outage, not a test failure)."

      - name: Run Playwright tests
        id: tests
        if: steps.preflight.outputs.reachable == 'true'
        continue-on-error: true
        run: npx playwright test --project=${{ matrix.project }}

      # The suite already retries transient blips (retries: 2). If it still
      # failed, decide *why*: a real regression fails while the target is
      # healthy; if the target has since gone unreachable, treat it as an outage.
      - name: Classify outcome (target outage vs real failure)
        if: steps.tests.outcome == 'failure'
        run: |
          if curl -sSf -m 10 --retry 2 --retry-delay 3 -o /dev/null "$BASE_URL/"; then
            echo "::error::Tests failed while $BASE_URL was reachable — this is a real failure."
            exit 1
          fi
          echo "::warning::Tests failed but $BASE_URL is unreachable — treating as a target outage, not a code failure."

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          retention-days: 14

      - name: Upload JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.project }}
          path: reports/junit.xml
          retention-days: 14

      - name: Upload traces on failure
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.project }}
          path: test-results/**/trace.zip
          retention-days: 14

  smoke-gate:
    name: Smoke gate (PR fast feedback)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Preflight — is the target reachable?
        id: preflight
        run: |
          for attempt in 1 2 3; do
            if curl -sSf -m 15 -o /dev/null "$BASE_URL/"; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::$BASE_URL is unreachable — skipping the smoke gate (target outage, not a test failure)."

      - name: Run smoke tests
        id: tests
        if: steps.preflight.outputs.reachable == 'true'
        continue-on-error: true
        run: npx playwright test --project=chromium --grep @smoke

      - name: Classify outcome (target outage vs real failure)
        if: steps.tests.outcome == 'failure'
        run: |
          if curl -sSf -m 10 --retry 2 --retry-delay 3 -o /dev/null "$BASE_URL/"; then
            echo "::error::Smoke tests failed while $BASE_URL was reachable — real failure."
            exit 1
          fi
          echo "::warning::Smoke tests failed but $BASE_URL is unreachable — treating as a target outage."
