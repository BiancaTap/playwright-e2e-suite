version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      playwright:
        patterns:
          - '@playwright/*'
          - 'playwright*'
          - 'eslint-plugin-playwright'
      types:
        patterns:
          - '@types/*'
      tooling:
        patterns:
          - 'eslint*'
          - 'typescript'
          - 'prettier'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
